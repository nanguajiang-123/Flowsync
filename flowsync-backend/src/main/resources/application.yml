server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flowsync_simple?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

# JWT 配置（生产环境通过环境变量注入，开发环境可用 .env 文件覆盖）
jwt:
  secret: ${JWT_SECRET:flowsync-dev-secret-key-do-not-use-in-production}
  expiration: ${JWT_EXPIRATION:86400}
  algorithm: ${JWT_ALGORITHM:HS256}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 千问 API Key（通过环境变量或 .env 文件注入，不写入代码仓库）
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}

# 日志级别
logging:
  level:
    hgc.flowsyncapi: debug
