version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: route
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: route
      MYSQL_DATABASE: route
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./flowsync-backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
